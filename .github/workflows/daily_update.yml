name: Daily Dota 2 Meta Updateon:schedule:- cron: '0 12 * * *'workflow_dispatch:permissions:contents: writejobs:update-data:runs-on: ubuntu-lateststeps:- name: Checkout Repositoryuses: actions/checkout@v4  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install google-generativeai requests beautifulsoup4

  - name: Run Meta Script
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    run: python update.py

  - name: Commit and Push
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git add data.json
      git diff-index --quiet HEAD || git commit -m "Auto-update data.json with Gemini AI"
      git push
