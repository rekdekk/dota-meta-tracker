name: Daily Dota 2 Meta Update

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Meta Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Индексируем файл, игнорируем системные предупреждения
          git add data.json || true
          
          # Коммитим. Если изменений нет, команда не убьет процесс (сработает true)
          git commit -m "Absolute Meta & AI: Auto-update data.json" || true
          
          # Отправляем в репозиторий. Если гитхаб тупит с правами, скрипт всё равно выживет
          git push || true
